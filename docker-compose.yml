version: "3.9"

services:
  pipeline:
    build: .
    environment:
      - OCEAN_API_KEY=${OCEAN_API_KEY}
      - PROSPEO_API_KEY=${PROSPEO_API_KEY}
      - EAZYREACH_CLIENT_ID=${EAZYREACH_CLIENT_ID}
      - EAZYREACH_CLIENT_SECRET=${EAZYREACH_CLIENT_SECRET}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
    stdin_open: true
    tty: true
